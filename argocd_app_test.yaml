apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-webapp
  namespace: argocd
spec:
  project: engineering-team
  source:
    repoURL: 'https://github.com/Abhishek-Singh2016/Python-Flask-CRUD-App.git'
    targetRevision: HEAD
    path: k8s-manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod-webapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true